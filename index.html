<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 대관 현황</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .day-sun { color: #EF4444; }
        .day-sat { color: #3B82F6; }
        .bu-chip { transition: all 0.2s; border: 1.5px solid #e2e8f0; cursor: pointer; background: white; white-space: nowrap; }
        .bu-chip.active { background-color: #1E3A5F; color: white; border-color: #1E3A5F; font-weight: 800; }
        .rental-card { border: 1.2px solid #e2e8f0; background: white; border-radius: 0.75rem; }
        .status-badge { font-weight: 800; padding: 1px 6px; border-radius: 4px; font-size: 10px; border-width: 1px; }
        .type-header { font-size: 11px; font-weight: 900; display: flex; items-center; gap: 4px; margin-bottom: 6px; margin-left: 4px; }
        .empty-box { border: 1.5px dashed #cbd5e1; border-radius: 0.75rem; padding: 1.25rem; text-align: center; color: #64748b; font-size: 11px; font-weight: 700; margin-bottom: 1rem; background-color: #ffffff; }
        
        /* 상태 표시 아이콘 스타일 */
        .status-pill { display: flex; items-center; gap: 5px; padding: 5px 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot-online { background-color: #10B981; box-shadow: 0 0 6px #10B981; }
        .dot-offline { background-color: #EF4444; box-shadow: 0 0 6px #EF4444; }
    </style>
</head>
<body class="text-slate-800">
    <div id="app" class="max-w-2xl mx-auto flex flex-col items-center p-2 pt-3 pb-20">
        
        <div id="header" class="w-full bg-[#EEF2F6] rounded-2xl p-4 flex flex-col mb-3 border border-slate-200 shadow-sm items-center">
            <div class="flex items-center gap-2 mb-1">
                <h1 class="text-lg font-black text-[#1E3A5F] tracking-tighter">성의교정 대관 현황</h1>
                <span id="shiftBadge" class="text-white text-[10px] px-2 py-0.5 rounded-md font-black shadow-sm tracking-tight">--</span>
            </div>
            <div class="flex items-center">
                <span id="dateDisplay" class="font-black text-slate-600 text-xl tracking-tight cursor-pointer" onclick="document.getElementById('dateInputHidden').showPicker()">날짜 로딩...</span>
                <input type="date" id="dateInputHidden" class="hidden" onchange="syncDateInput()">
            </div>
        </div>

        <div class="w-full mb-3 px-1">
            <div class="grid grid-cols-4 gap-1.5" id="buContainer"></div>
        </div>

        <div id="results-anchor" class="w-full flex items-center justify-between mb-3 px-1 pb-2 border-b border-slate-100">
            <div class="flex items-center">
                <div id="statusPill" class="status-pill">
                    <span id="statusDot" class="status-dot dot-offline"></span>
                    <span id="statusText" class="text-[10px] font-black text-slate-400 uppercase tracking-tight">접속 중...</span>
                </div>
            </div>
            <div class="flex gap-1.5">
                <button onclick="moveDate(-1)" class="bg-white border border-slate-300 rounded-lg px-4 py-2 text-[12px] font-black text-slate-600 shadow-sm active:bg-slate-50">← PREV</button>
                <button onclick="moveDate(0)" class="bg-white border border-slate-300 rounded-lg px-4 py-2 text-[12px] font-black text-[#1E3A5F] shadow-sm active:bg-slate-50">TODAY</button>
                <button onclick="moveDate(1)" class="bg-white border border-slate-300 rounded-lg px-4 py-2 text-[12px] font-black text-slate-600 shadow-sm active:bg-slate-50">NEXT →</button>
            </div>
        </div>

        <div id="rentalSection" class="w-full">
            <div id="loading" class="text-center py-10 text-slate-400 font-bold text-xs">데이터를 불러오는 중...</div>
            <div id="listArea"></div>
        </div>

        <div class="w-full py-8 text-center">
            <p class="text-[10px] font-bold text-slate-300 tracking-widest uppercase">Catholic Univ. Songeui Campus</p>
        </div>

        <div class="fixed bottom-6 right-4 flex flex-col gap-2 z-40">
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="w-10 h-10 bg-white text-[#1E3A5F] border-2 border-[#1E3A5F] rounded-full shadow-lg flex items-center justify-center font-black text-[9px]">TOP</button>
            <button onclick="document.getElementById('results-anchor').scrollIntoView({behavior:'smooth'})" class="w-10 h-10 bg-[#1E3A5F] text-white rounded-full shadow-lg flex flex-col items-center justify-center font-black text-[8px] leading-tight text-center">결과<br>보기</button>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTi4T20_JgmIH8e5kIsaokmfTT0Fz7Ua2MS4YnBPmHoCIqtB0F7WpY00fXDbOifOu7WZEjXJm9iWCUT/pub?gid=1152941284&single=true&output=csv";
        const BUILDINGS = ["전체", "성의회관", "의산연", "옴니버스 파크", "의과대학", "간호대학", "대학본관", "서울성모별관"];
        let selectedBu = ["성의회관", "의산연"]; 
        let allData = [];
        let currentDate = new Date();

        async function loadData() {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');

            try {
                const res = await fetch(CSV_URL + "&t=" + new Date().getTime()); 
                if (!res.ok) throw new Error();
                const text = await res.text();
                
                localStorage.setItem("rental_db_cache", text);
                
                // 온라인 상태 UI
                dot.className = "status-dot dot-online";
                txt.innerText = "ONLINE";
                txt.className = "text-[10px] font-black text-emerald-500 tracking-tight";
                
                processData(text);
            } catch (e) { 
                const backup = localStorage.getItem("rental_db_cache");
                if (backup) {
                    // 오프라인 상태 UI
                    dot.className = "status-dot dot-offline";
                    txt.innerText = "OFFLINE";
                    txt.className = "text-[10px] font-black text-red-500 tracking-tight";
                    processData(backup);
                } else {
                    document.getElementById('loading').innerText = "⚠️ 데이터 없음 (온라인 연결 필요)";
                }
            }
        }

        function processData(text) {
            const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            allData = rows.slice(1).map(r => ({
                rawDate: r[0]?.replace(/"/g, '').trim() || "",
                type: r[3]?.replace(/"/g, '').trim() || "",
                period: r[4]?.replace(/"/g, '').trim() || "",
                yoil: r[5]?.replace(/"/g, '').trim() || "",
                bu: r[6]?.replace(/"/g, '').trim() || "",
                place: r[7]?.replace(/"/g, '').trim() || "",
                time: r[8]?.replace(/"/g, '').trim() || "",
                event: r[9]?.replace(/"/g, '').trim() || "",
                dept: r[10]?.replace(/"/g, '').trim() || "",
                people: r[11]?.replace(/"/g, '').trim() || "",
                status: r[12]?.replace(/"/g, '').trim() || ""
            })).filter(r => r.rawDate !== "");
            document.getElementById('loading').classList.add('hidden');
            updateDisplay();
        }

        function moveDate(offset) {
            if (offset === 0) currentDate = new Date();
            else currentDate.setDate(currentDate.getDate() + offset);
            updateDisplay();
        }
        function syncDateInput() {
            currentDate = new Date(document.getElementById('dateInputHidden').value);
            updateDisplay();
        }

        function updateDisplay() {
            const yyyy = currentDate.getFullYear();
            const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dd = String(currentDate.getDate()).padStart(2, '0');
            const dateStr = `${yyyy}-${mm}-${dd}`;
            const dayIdx = currentDate.getDay();
            const dayNames = ['일','월','화','수','목','금','토'];
            
            document.getElementById('dateDisplay').innerHTML = `${yyyy}.${mm}.${dd} <span class="${dayIdx===0?'day-sun':(dayIdx===6?'day-sat':'')}">(${dayNames[dayIdx]})</span>`;
            
            const baseDate = new Date('2026-03-13');
            const diff = Math.floor((new Date(dateStr).setHours(0,0,0,0) - baseDate.setHours(0,0,0,0)) / 86400000);
            const patterns = [{n:'A', c:'#EF4444'}, {n:'B', c:'#F59E0B'}, {n:'C', c:'#3B82F6'}];
            const shift = patterns[((diff % 3) + 3) % 3];
            const badge = document.getElementById('shiftBadge');
            badge.innerText = `${shift.n}조 근무`;
            badge.style.backgroundColor = shift.c;

            renderRental(dateStr);
        }

        function renderRental(selectedDate) {
            const listArea = document.getElementById('listArea');
            listArea.innerHTML = "";
            const dayData = allData.filter(r => r.rawDate === selectedDate);

            if (selectedBu.length === 0) {
                listArea.innerHTML = '<div class="empty-box">건물을 선택해주세요.</div>';
                return;
            }

            selectedBu.forEach(buName => {
                if (buName === "전체") return;
                const searchBu = buName === "의산연" ? "의생명산업연구원" : buName;
                const buFiltered = dayData.filter(r => r.bu.includes(searchBu));
                
                let buHtml = `<div class="mb-5"><div class="flex items-center gap-1.5 px-1 font-black text-[15px] text-[#1E3A5F] mb-2"><span class="w-1 h-3.5 bg-[#1E3A5F] rounded-full"></span>${buName}</div>`;
                
                if (buFiltered.length === 0) {
                    buHtml += `<div class="empty-box">대관 내역이 없습니다.</div>`;
                } else {
                    const daily = buFiltered.filter(r => r.type === '당일');
                    const periodic = buFiltered.filter(r => r.type === '기간');

                    if(daily.length > 0) {
                        buHtml += `<div class="type-header text-blue-500">🔵 당일 대관 <span class="bg-blue-50 px-1.5 rounded text-[9px] border border-blue-100">${daily.length}</span></div>`;
                        daily.forEach(r => buHtml += createCard(r, false));
                    }
                    if(periodic.length > 0) {
                        buHtml += `<div class="type-header text-purple-500 mt-2">🟣 기간 대관 <span class="bg-purple-50 px-1.5 rounded text-[9px] border border-purple-100">${periodic.length}</span></div>`;
                        periodic.forEach(r => buHtml += createCard(r, true));
                    }
                }
                buHtml += `</div>`;
                listArea.innerHTML += buHtml;
            });
        }

        function createCard(r, isPeriodic) {
            const statusColor = r.status === '확정' || r.status === '승인' ? 'bg-orange-50 text-orange-600 border-orange-100' : 'bg-slate-50 text-slate-500 border-slate-100';
            return `
                <div class="rental-card p-3 mb-2 shadow-sm border-l-[4px] ${!isPeriodic ? 'border-l-blue-400' : 'border-l-purple-400'}">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[12px] font-black text-slate-700 tracking-tight">📍 ${r.place}</span>
                        <span class="text-[10px] font-bold text-red-500 italic">🕒 ${r.time}</span>
                    </div>
                    <div class="text-[14px] font-black text-slate-900 mb-2 leading-tight tracking-tight">${r.event}</div>
                    ${isPeriodic ? `<div class="mb-2 text-[9px] font-bold text-purple-500 bg-purple-50/50 p-1 rounded tracking-tighter">📅 ${r.period} (${r.yoil})</div>` : ''}
                    <div class="flex justify-between items-center pt-1">
                        <div class="flex items-center gap-1.5">
                            <span class="status-badge ${statusColor}">${r.status}</span>
                            <span class="text-[10px] font-bold text-slate-500 italic">🏢 ${r.dept}</span>
                        </div>
                        <span class="text-[10px] font-bold text-slate-300 tracking-tighter">👥 ${r.people}명</span>
                    </div>
                </div>`;
        }

        window.onload = () => {
            const container = document.getElementById('buContainer');
            BUILDINGS.forEach(bu => {
                const chip = document.createElement('div');
                chip.className = `bu-chip py-1.5 rounded-lg text-[10px] font-black text-center shadow-sm ${selectedBu.includes(bu) ? 'active' : ''}`;
                chip.innerText = bu;
                chip.onclick = () => {
                    if (bu === "전체") {
                        const allBuildings = BUILDINGS.filter(b => b !== "전체");
                        selectedBu = (selectedBu.length === allBuildings.length) ? [] : [...allBuildings];
                    } else {
                        if (selectedBu.includes(bu)) selectedBu = selectedBu.filter(b => b !== bu);
                        else selectedBu.push(bu);
                    }
                    document.querySelectorAll('.bu-chip').forEach((c, i) => {
                        const b = BUILDINGS[i];
                        if (b === "전체") c.classList.toggle('active', selectedBu.length === BUILDINGS.length - 1);
                        else c.classList.toggle('active', selectedBu.includes(b));
                    });
                    updateDisplay();
                };
                container.appendChild(chip);
            });
            loadData();
        };
    </script>
</body>
</html>
